<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" aria-label="ATLiens alien logo">
  <defs>
    <!-- teal-to-green gradient, matching the shirt print -->
    <radialGradient id="skin" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#8ed4c7"/>
      <stop offset="45%" stop-color="#5bbfa0"/>
      <stop offset="100%" stop-color="#3a8f66"/>
    </radialGradient>
    <!-- subtle inner shadow for eyes -->
    <radialGradient id="eyeShade" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#000"/>
    </radialGradient>
  </defs>

  <!-- head: teardrop / bulbous alien shape, wider at top -->
  <path d="M100 14
           C 150 14, 184 54, 184 100
           C 184 140, 168 170, 140 190
           C 125 201, 112 208, 100 208
           C 88 208, 75 201, 60 190
           C 32 170, 16 140, 16 100
           C 16 54, 50 14, 100 14 Z"
        fill="url(#skin)"
        stroke="#0f1f18"
        stroke-width="5"
        stroke-linejoin="round"/>

  <!-- left almond eye -->
  <ellipse cx="64" cy="108" rx="20" ry="30"
           fill="url(#eyeShade)"
           stroke="#0f1f18"
           stroke-width="3"
           transform="rotate(-18 64 108)"/>

  <!-- right almond eye -->
  <ellipse cx="136" cy="108" rx="20" ry="30"
           fill="url(#eyeShade)"
           stroke="#0f1f18"
           stroke-width="3"
           transform="rotate(18 136 108)"/>

  <!-- eye highlights -->
  <ellipse cx="58" cy="94" rx="5" ry="7" fill="#ffffff" opacity="0.95" transform="rotate(-18 58 94)"/>
  <ellipse cx="130" cy="94" rx="5" ry="7" fill="#ffffff" opacity="0.95" transform="rotate(18 130 94)"/>

  <!-- tiny smile -->
  <path d="M82 168 Q100 180 118 168"
        fill="none"
        stroke="#0f1f18"
        stroke-width="5"
        stroke-linecap="round"/>
</svg>
