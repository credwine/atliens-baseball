<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" aria-label="ATLiens alien logo">
  <defs>
    <radialGradient id="skin" cx="50%" cy="38%" r="70%">
      <stop offset="0%" stop-color="#a7ff4a"/>
      <stop offset="50%" stop-color="#39FF14"/>
      <stop offset="100%" stop-color="#1f8a0a"/>
    </radialGradient>
  </defs>

  <!-- classic alien head: wider at top, narrower chin -->
  <path d="M100 10
           C 160 10, 190 58, 190 108
           C 190 148, 172 180, 142 200
           C 128 210, 114 216, 100 216
           C 86 216, 72 210, 58 200
           C 28 180, 10 148, 10 108
           C 10 58, 40 10, 100 10 Z"
        fill="url(#skin)"
        stroke="#062908"
        stroke-width="4"
        stroke-linejoin="round"/>

  <!-- huge black almond eyes, no highlights -->
  <ellipse cx="60" cy="118" rx="26" ry="40"
           fill="#000"
           transform="rotate(-22 60 118)"/>

  <ellipse cx="140" cy="118" rx="26" ry="40"
           fill="#000"
           transform="rotate(22 140 118)"/>
</svg>
